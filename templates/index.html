<!DOCTYPE html>
<html>
<head>
    <title>Integración Siigo → Detrack - Lubrisol</title>
    <style>
        body { font-family: "Segoe UI", Arial; margin: 0; background: #ffffff; }
        header { background: #006633; color: white; padding: 15px; display: flex; align-items: center; }
        header img { height: 60px; margin-right: 20px; }
        header h1 { margin: 0; font-size: 22px; }
        .tabs { display: flex; background: #f0f0f0; }
        .tabs button { flex: 1; padding: 12px; border: none; background: #006633; color: white; cursor: pointer; font-weight: bold; }
        .tabs button:hover { background: #00994d; }
        .tab { display: none; padding: 20px; }
        .tab.active { display: block; }
        button.action { margin: 5px; padding: 10px 20px; background: #006633; color: white; border: none; cursor: pointer; font-weight: bold; }
        button.action:hover { background: #00994d; }
        #log { margin: 20px; padding: 10px; border: 1px solid #ccc; height: 200px; overflow-y: scroll; font-family: Consolas; background: #fafafa; }
        .info { color: blue; }
        .success { color: green; }
        .error { color: red; }
        footer { background: #f9f9f9; padding: 10px; text-align: right; }
    </style>
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</head>
<body>
    <header>
        <img src="logo_lubrisol.png" alt="Lubrisol Logo">
        <h1>Integración Siigo → Detrack - Lubrisol</h1>
    </header>

    <div class="tabs">
        <button onclick="showTab('siigo')">Consultas Siigo</button>
        <button onclick="showTab('detrack')">Acciones Detrack</button>
        <button onclick="showTab('empleados')">Portal Empleados</button>
    </div>

    <div id="siigo" class="tab active">
        <h2>Consultas Siigo</h2>
        <label>Fecha (YYYY-MM-DD):</label><br>
        <input type="text"><br>
        <button class="action">Consultar por fecha</button>
        <button class="action">Consultar facturas de hoy</button><br><br>
        <label>Número de factura (FV):</label><br>
        <input type="text"><br>
        <button class="action">Consultar factura puntual</button>
    </div>

    <div id="detrack" class="tab">
        <h2>Acciones Detrack</h2>
        <label>Fecha (YYYY-MM-DD):</label><br>
        <input type="text"><br>
        <button class="action">Consultar por fecha</button><br><br>
        <label>Número de DO (Detrack):</label><br>
        <input type="text"><br>
        <button class="action">Consultar orden puntual</button><br><br>
        <button class="action">Generar Excel sin subir</button>
        <button class="action">Generar Excel y subir</button>
        <button class="action">Subir último Excel a Detrack</button>
        <button class="action">Crear nueva Orden/Job</button>
        <button class="action">Consultar por rango de fechas</button>
    </div>

    <div id="empleados" class="tab">
        <h2>Portal Empleados</h2>
        <iframe src="https://lubrisolae.web.app" width="100%" height="400"></iframe>
    </div>

    <div id="log">
        <p class="info">ℹ️ Mensajes informativos aparecerán aquí...</p>
        <p class="success">✅ Mensajes de éxito aparecerán aquí...</p>
        <p class="error">🚫 Mensajes de error aparecerán aquí...</p>
    </div>

    <footer>
        <button class="action">Salir</button>
    </footer>
</body>
</html>
